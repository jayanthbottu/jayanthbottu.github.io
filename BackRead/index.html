<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACKUP READER</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASICS --- */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #1a1d21; 
            color: #e0e0e0;
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- LANDING PAGE --- */
        #landing-page { 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100vh; width: 100%; position: absolute; z-index: 10;
            background-color: #1a1d21;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem; margin: 0; color: #fff;
            letter-spacing: -2px;
        }

        p.subtitle { color: #8899ac; font-family: 'Space Grotesk', monospace; margin-bottom: 30px; }

        .upload-btn { 
            background: #2b3036; color: white; padding: 15px 30px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; 
            border: 1px solid #444; font-family: 'Space Grotesk', sans-serif;
            transition: background 0.2s;
        }
        .upload-btn:hover { background: #6200ea; border-color: #6200ea; }
        input[type="file"] { display: none; }

        /* --- MAIN CHAT UI --- */
        #app-container { 
            display: none; height: 100vh; 
            flex-direction: column; max-width: 900px; margin: 0 auto; 
            background: #21252b; 
            border-left: 1px solid #333; border-right: 1px solid #333;
        }
        
        header { 
            padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #333; background: #21252b; z-index: 200;
        }
        .header-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; }
        
        #pdf-btn { 
            background: #333; border: none; color: #ddd; 
            padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; 
            font-family: 'Space Grotesk', monospace;
        }
        #pdf-btn:hover { background: #fff; color: #000; }

        /* --- CHAT AREA --- */
        #chat-window { 
            flex: 1; overflow-y: auto; padding: 0 20px 20px 20px;
            contain: strict; 
        }

        /* --- STICKY DATE DIVIDER --- */
        .date-divider {
            position: sticky;
            top: 10px;
            z-index: 100;
            text-align: center;
            margin: 20px 0;
            pointer-events: none;
        }
        
        .date-divider span {
            background: rgba(33, 37, 43, 0.85);
            backdrop-filter: blur(4px);
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- MESSAGES --- */
        .message-row { 
            display: flex; margin-bottom: 10px; width: 100%; 
            content-visibility: auto; 
            contain-intrinsic-size: 50px; 
        }

        .message { 
            max-width: 80%; padding: 12px 16px; 
            border-radius: 12px; position: relative; 
            font-size: 15px; line-height: 1.5; word-wrap: break-word; 
        }
        
        /* RECEIVED (Left) */
        .message-row.received { justify-content: flex-start; }
        .message-row.received .message { 
            background: #2f363d; 
            color: #e6e6e6;
            border-bottom-left-radius: 2px;
        }
        .sender-name { 
            font-size: 10px; color: #9da5b4; margin-bottom: 3px; display: block; 
            text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;
        }

        /* SENT (Right) */
        .message-row.sent { justify-content: flex-end; }
        .message-row.sent .message { 
            background: #6200ea; color: white; 
            border-bottom-right-radius: 2px;
        }

        .metadata { 
            font-size: 10px; opacity: 0.6; margin-top: 4px; 
            text-align: right; font-family: 'Space Grotesk', monospace; 
        }

        /* --- MODAL --- */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 200; 
            display: none; align-items: center; justify-content: center; 
        }
        .modal { 
            background: #21252b; border: 1px solid #444; 
            padding: 25px; border-radius: 12px; width: 300px; text-align: center; 
        }
        .modal h3 { margin-top: 0; color: white; font-family: 'Space Grotesk'; }
        .name-btn { 
            display: block; width: 100%; padding: 12px; margin: 8px 0; 
            background: #2f363d; border: none; border-radius: 6px; 
            color: white; cursor: pointer; transition: 0.2s; 
            font-family: 'Outfit', sans-serif;
        }
        .name-btn:hover { background: #6200ea; }

        /* PRINT STYLES */
        @media print {
            body, #app-container { background: white; color: black; height: auto; overflow: visible; }
            header, #landing-page { display: none; }
            .message-row { content-visibility: visible; }
            .message-row.sent .message { background: #eee; color: black; border: 1px solid #ccc; }
            .message-row.received .message { background: #fff; color: black; border: 1px solid #ccc; }
            .date-divider { position: static; text-align: center; margin: 20px 0; }
            .date-divider span { background: #eee; color: #000; border: 1px solid #ccc; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1>BACKUP<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50" style="margin-right: -4px;">READER</h1>
        <p class="subtitle">Secured Offline WhatsApp Chat Backup File Reader</p>
        <label class="upload-btn">
            OPEN .TXT or .ZIP FILE
            <input type="file" id="fileInput" accept=".txt,.zip">
        </label>
        <p id="loading-text" style="display:none; color: #6200ea; margin-top: 20px;">PARSING DATA...</p>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3>WHO ARE YOU?</h3>
            <div id="name-list"></div>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div class="header-title"> <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30" style="vertical-align: -6px;"> CHAT PREVIEW</div>
            <button id="pdf-btn" onclick="window.print()">PRINT / PDF</button>
        </header>
        <div id="chat-window"></div>
    </div>

    <!-- JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let parsedMessages = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading-text').style.display = 'block';

            setTimeout(() => {
                if (file.name.endsWith('.zip')) {
                    handleZipFile(file);
                } else if (file.name.endsWith('.txt')) {
                    handleTxtFile(file);
                } else {
                    alert('Please upload a .txt or .zip file');
                    document.getElementById('loading-text').style.display = 'none';
                }
            }, 50);
        });

        function handleTxtFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) { 
                parseText(e.target.result); 
            };
            reader.readAsText(file);
        }

        function handleZipFile(file) {
            JSZip.loadAsync(file)
                .then(function(zip) {
                    // Look for .txt files in the zip
                    let txtFile = null;
                    
                    // Search for the chat text file
                    zip.forEach(function(relativePath, zipEntry) {
                        if (zipEntry.name.endsWith('.txt') && !zipEntry.dir) {
                            txtFile = zipEntry;
                        }
                    });

                    if (!txtFile) {
                        alert('No .txt file found in the ZIP archive');
                        document.getElementById('loading-text').style.display = 'none';
                        return;
                    }

                    // Read the txt file content
                    return txtFile.async('string');
                })
                .then(function(content) {
                    if (content) {
                        parseText(content);
                    }
                })
                .catch(function(error) {
                    console.error('Error reading ZIP file:', error);
                    alert('Error reading ZIP file. Please try again.');
                    document.getElementById('loading-text').style.display = 'none';
                });
        }

        function parseText(text) {
            const regex = /^(\d{1,2}\/\d{1,2}\/\d{2,4}),\s+(\d{1,2}:\d{2}(?:[\s\u202F]?[ap]m)?)\s-\s(.*)/i;
            
            const lines = text.split('\n');
            let currentMessage = null;
            parsedMessages = [];

            lines.forEach(line => {
                line = line.trim().replace(/[\u200E\u200F]/g, ""); 
                
                const match = line.match(regex);
                
                if (match) {
                    if (currentMessage) parsedMessages.push(currentMessage);
                    
                    const fullContent = match[3];
                    let sender = "System"; 
                    let content = fullContent;

                    const colonIndex = fullContent.indexOf(': ');
                    
                    if (colonIndex > -1) {
                        sender = fullContent.substring(0, colonIndex);
                        content = fullContent.substring(colonIndex + 2);
                    } else {
                        if (fullContent.includes('end-to-end encrypted')) {
                            currentMessage = null; 
                            return; 
                        }
                    }

                    currentMessage = {
                        date: match[1],
                        time: match[2],
                        sender: sender,
                        content: content
                    };
                } else if (currentMessage) {
                    currentMessage.content += '<br>' + line;
                }
            });
            
            if (currentMessage) parsedMessages.push(currentMessage);
            
            if (parsedMessages.length === 0) {
                alert("Could not parse messages. Please check the file format.");
                document.getElementById('loading-text').style.display = 'none';
                return;
            }

            showUserSelection();
        }

        function showUserSelection() {
            const senders = [...new Set(parsedMessages.map(m => m.sender))];
            const userSenders = senders.filter(s => s !== "System");

            const list = document.getElementById('name-list');
            list.innerHTML = '';
            
            userSenders.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'name-btn';
                btn.innerText = name;
                btn.onclick = () => loadChat(name);
                list.appendChild(btn);
            });

            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function loadChat(myName) {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            
            const chatWindow = document.getElementById('chat-window');
            const fragment = document.createDocumentFragment();
            
            let lastDate = null;

            parsedMessages.forEach(msg => {
                if (msg.date !== lastDate) {
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-divider';
                    dateDiv.innerHTML = `<span>${msg.date}</span>`;
                    fragment.appendChild(dateDiv);
                    lastDate = msg.date;
                }

                const isMe = msg.sender === myName;
                const isSystem = msg.sender === "System";

                const row = document.createElement('div');
                
                if (isSystem) {
                    row.className = 'message-row received'; 
                } else {
                    row.className = `message-row ${isMe ? 'sent' : 'received'}`;
                }
                
                let content = msg.content;
                
                if (content.includes('<Media omitted>')) {
                    content = `<span style="font-style:italic; opacity:0.7">📷 Image/Media omitted</span>`;
                }
                
                const nameTag = (!isMe) ? `<span class="sender-name">${msg.sender}</span>` : '';

                row.innerHTML = `
                    <div class="message" style="${isSystem ? 'background:#333; font-style:italic; font-size:0.8em; margin: 0 auto;' : ''}">
                        ${!isSystem ? nameTag : ''}
                        ${content}
                        <div class="metadata">${msg.time}</div>
                    </div>
                `;
                fragment.appendChild(row);
            });
            
            chatWindow.appendChild(fragment);
            setTimeout(() => {
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
