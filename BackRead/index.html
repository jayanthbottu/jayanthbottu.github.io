<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BACKUP READER</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & BASICS --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #1a1d21; 
            color: #e0e0e0;
            height: 100vh; 
            overflow: hidden; /* Prevent body scroll, handle inside app-container */
            display: flex;
            flex-direction: column;
        }

        /* --- LANDING PAGE --- */
        #landing-page { 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            height: 100%; width: 100%; position: absolute; z-index: 10;
            background-color: #1a1d21;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            /* Fluid font size: min 2rem, preferred 5vw, max 3.5rem */
            font-size: clamp(2rem, 8vw, 3.5rem); 
            margin: 0; color: #fff;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        p.subtitle { 
            color: #8899ac; 
            font-family: 'Space Grotesk', monospace; 
            margin-bottom: 40px; 
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }

        .upload-btn { 
            background: #2b3036; color: white; padding: 18px 35px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; 
            border: 1px solid #444; font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1.1rem;
        }
        .upload-btn:hover, .upload-btn:active { background: #6200ea; border-color: #6200ea; transform: translateY(-2px); }
        input[type="file"] { display: none; }

        /* --- MAIN CHAT UI --- */
        #app-container { 
            display: none; height: 100%; width: 100%;
            flex-direction: column; 
            max-width: 900px; /* Limits width on desktop */
            margin: 0 auto; 
            background: #21252b; 
            border-left: 1px solid #333; border-right: 1px solid #333;
            position: relative;
        }
        
        header { 
            padding: 15px 20px; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #333; background: #21252b; 
            z-index: 200;
            flex-shrink: 0; /* Prevents header from collapsing */
        }
        .header-title { 
            font-family: 'Space Grotesk', sans-serif; 
            font-size: 1.1rem; 
            font-weight: 700; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #pdf-btn { 
            background: #333; border: none; color: #ddd; 
            padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; 
            font-family: 'Space Grotesk', monospace;
            transition: background 0.2s;
        }
        #pdf-btn:hover { background: #fff; color: #000; }

        /* --- CHAT AREA --- */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 0 15px 20px 15px; 
            contain: strict; 
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }

        /* --- STICKY DATE DIVIDER --- */
        .date-divider {
            position: sticky; 
            top: 15px; 
            z-index: 100; 
            text-align: center;
            margin: 25px 0;
            pointer-events: none; 
        }
        
        .date-divider span {
            background: rgba(33, 37, 43, 0.85); 
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8); 
            font-size: 0.75rem;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* --- MESSAGES --- */
        .message-row { 
            display: flex; margin-bottom: 8px; width: 100%; 
            content-visibility: auto; 
            contain-intrinsic-size: 50px; 
        }

        .message { 
            max-width: 85%; padding: 10px 14px; 
            border-radius: 12px; position: relative; 
            font-size: 0.95rem; line-height: 1.45; 
            word-wrap: break-word; /* Prevents long words breaking layout */
            word-break: break-word;
        }
        
        /* RECEIVED (Left) */
        .message-row.received { justify-content: flex-start; }
        .message-row.received .message { 
            background: #2f363d; 
            color: #e6e6e6;
            border-bottom-left-radius: 2px;
        }
        .sender-name { 
            font-size: 0.7rem; color: #aab2c0; margin-bottom: 4px; display: block; 
            text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;
        }

        /* SENT (Right) */
        .message-row.sent { justify-content: flex-end; }
        .message-row.sent .message { 
            background: #6200ea; color: white; 
            border-bottom-right-radius: 2px;
        }

        .metadata { 
            font-size: 0.65rem; opacity: 0.7; margin-top: 4px; 
            text-align: right; font-family: 'Space Grotesk', monospace; 
            margin-right: -4px; /* Align slightly right */
        }

        /* --- MODAL --- */
        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 300; 
            display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(5px);
        }
        .modal { 
            background: #21252b; border: 1px solid #444; 
            padding: 30px; border-radius: 16px; 
            width: 90%; max-width: 350px; /* Responsive width */
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal h3 { margin-top: 0; color: white; font-family: 'Space Grotesk'; margin-bottom: 20px; }
        .name-btn { 
            display: block; width: 100%; padding: 14px; margin: 8px 0; 
            background: #2f363d; border: none; border-radius: 8px; 
            color: white; cursor: pointer; transition: 0.2s; 
            font-family: 'Outfit', sans-serif; font-size: 1rem;
        }
        .name-btn:hover, .name-btn:active { background: #6200ea; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            #app-container {
                max-width: 100%;
                border: none;
            }
            .message { max-width: 88%; font-size: 0.95rem; }
            h1 { margin-bottom: 10px; }
            .header-title { font-size: 1rem; }
        }

        /* PRINT STYLES */
        @media print {
            body, #app-container { background: white; color: black; height: auto; overflow: visible; display: block; }
            header, #landing-page { display: none; }
            .message-row { content-visibility: visible; break-inside: avoid; }
            .message-row.sent .message { background: #eee; color: black; border: 1px solid #ccc; }
            .message-row.received .message { background: #fff; color: black; border: 1px solid #ccc; }
            .date-divider { position: static; text-align: center; margin: 20px 0; border: none; }
            .date-divider span { background: #eee; color: #000; border: 1px solid #ccc; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div id="landing-page">
        <h1>BACKUP<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="50" style="margin-right: -4px; vertical-align: bottom;">READER</h1>
        <p class="subtitle">Secured Offline Chat Viewer</p>
        <label class="upload-btn">
            OPEN .TXT FILE
            <input type="file" id="fileInput" accept=".txt">
        </label>
        <p id="loading-text" style="display:none; color: #6200ea; margin-top: 20px; font-weight: bold;">PARSING DATA...</p>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h3>WHO ARE YOU?</h3>
            <div id="name-list"></div>
        </div>
    </div>

    <div id="app-container">
        <header>
            <div class="header-title"> <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="24"> CHAT PREVIEW</div>
            <button id="pdf-btn" onclick="window.print()">PRINT / PDF</button>
        </header>
        <div id="chat-window"></div>
    </div>

    <script>
        let parsedMessages = [];

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading-text').style.display = 'block';

            setTimeout(() => {
                const reader = new FileReader();
                reader.onload = function(e) { parseText(e.target.result); };
                reader.readAsText(file);
            }, 50);
        });

        function parseText(text) {
            // Updated Regex to handle 1-digit dates/months usually found in some exports
            // Matches: DD/MM/YY, HH:MM - Name: Msg
            const regex = /^(\d{1,2}\/\d{1,2}\/\d{2,4}), (\d{1,2}:\d{2}) - ([^:]+): (.*)/;
            
            const lines = text.split('\n');
            let currentMessage = null;
            parsedMessages = [];

            lines.forEach(line => {
                line = line.trim().replace(/[\u200E\u200F]/g, ""); 
                const match = line.match(regex);
                
                if (match) {
                    if (currentMessage) parsedMessages.push(currentMessage);
                    currentMessage = {
                        date: match[1],
                        time: match[2],
                        sender: match[3],
                        content: match[4]
                    };
                } else if (currentMessage) {
                    currentMessage.content += '<br>' + line;
                }
            });
            if (currentMessage) parsedMessages.push(currentMessage);
            
            if (parsedMessages.length === 0) {
                alert("Could not parse messages. Ensure this is a valid WhatsApp .txt export.");
                document.getElementById('loading-text').style.display = 'none';
                return;
            }

            showUserSelection();
        }

        function showUserSelection() {
            const senders = [...new Set(parsedMessages.map(m => m.sender))];
            const list = document.getElementById('name-list');
            list.innerHTML = '';
            
            senders.forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'name-btn';
                btn.innerText = name;
                btn.onclick = () => loadChat(name);
                list.appendChild(btn);
            });

            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function loadChat(myName) {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            
            const chatWindow = document.getElementById('chat-window');
            const fragment = document.createDocumentFragment();
            
            let lastDate = null;

            parsedMessages.forEach(msg => {
                // DATE DIVIDER LOGIC
                if (msg.date !== lastDate) {
                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'date-divider';
                    dateDiv.innerHTML = `<span>${msg.date}</span>`;
                    fragment.appendChild(dateDiv);
                    lastDate = msg.date;
                }

                const isMe = msg.sender === myName;
                const row = document.createElement('div');
                row.className = `message-row ${isMe ? 'sent' : 'received'}`;
                
                let content = msg.content;
                // Basic check for media placeholder
                if (content.includes('<Media omitted>')) {
                    content = `<span style="font-style:italic; opacity:0.7">📷 Image/Media omitted</span>`;
                }
                
                const nameTag = !isMe ? `<span class="sender-name">${msg.sender}</span>` : '';

                row.innerHTML = `
                    <div class="message">
                        ${nameTag}
                        ${content}
                        <div class="metadata">${msg.time}</div>
                    </div>
                `;
                fragment.appendChild(row);
            });
            
            chatWindow.appendChild(fragment);
            // Scroll to bottom
            setTimeout(() => {
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
